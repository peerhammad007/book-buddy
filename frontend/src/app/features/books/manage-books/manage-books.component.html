<div class="manage-books-container">
  <!-- Header Section -->
  <div class="header-section">
    <h1 class="mat-headline-4">Your Listed Books</h1>
    <button mat-raised-button color="primary" routerLink="/books/add">
      <mat-icon>add</mat-icon>
      Add New Book
    </button>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading" class="loading-state">
    <mat-spinner diameter="40"></mat-spinner>
    <span>Loading your books...</span>
  </div>

  <!-- Empty State -->
  <mat-card *ngIf="!loading && books.length === 0" class="empty-state">
    <mat-card-content>
      <mat-icon class="empty-icon">menu_book</mat-icon>
      <h2>No Books Listed Yet</h2>
      <p>Start sharing your books with others by adding your first book.</p>
      <button mat-raised-button color="primary" routerLink="/books/add">
        <mat-icon>add</mat-icon>
        Add Your First Book
      </button>
    </mat-card-content>
  </mat-card>

  <!-- Books Grid -->
  <div *ngIf="!loading && books.length > 0" class="books-grid">
    <div class="book-item" *ngFor="let book of books">
      <app-book-card [book]="book"></app-book-card>
    </div>
  </div>
  <!-- Error Message -->
  <div *ngIf="errorMessage" class="error-message">
    <mat-card class="error-card">
      <mat-card-content>
        <mat-icon>error_outline</mat-icon>
        <span>{{ errorMessage }}</span>
      </mat-card-content>
    </mat-card>
  </div>
</div>
